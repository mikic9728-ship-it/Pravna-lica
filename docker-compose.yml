services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rsbi
      POSTGRES_USER: rsbi
      POSTGRES_PASSWORD: rsbi
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rsbi -d rsbi"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env.example
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_started}
    command: sh -c "cd apps/api && npx prisma migrate deploy && npx prisma db seed && node dist/main.js"
    ports: ["4000:4000"]
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
      NEXT_PUBLIC_BROWSER_API_URL: http://localhost:4000
    depends_on: [api]
    ports: ["3000:3000"]
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [web, api]
    ports: ["80:80"]
volumes:
  postgres_data:
  redis_data:
