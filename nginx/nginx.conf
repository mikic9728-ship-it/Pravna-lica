events {}
http {
  server_tokens off;
  gzip on;
  upstream web { server web:3000; }
  upstream api { server api:4000; }
  server {
    listen 80;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    location /api/ { proxy_pass http://api/; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /docs { proxy_pass http://api/docs; }
    location / { proxy_pass http://web; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
  }
}
